<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance System</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">Student Attendance</h1>
            <p class="text-slate-500">Record and track student presence in real-time</p>
        </header>

        <!-- Input Section -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8 border border-slate-200">
            <div class="space-y-4">
                <div>
                    <label for="studentName" class="block text-sm font-semibold text-slate-700 mb-1">Student Name</label>
                    <input type="text" id="studentName" placeholder="Enter full name..." 
                        class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
                
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="submitAttendance('Attendance')" class="flex flex-col items-center justify-center p-3 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-lg hover:bg-emerald-100 transition-colors">
                        <span class="text-sm font-bold uppercase tracking-wide">Present</span>
                    </button>
                    <button onclick="submitAttendance('Absence')" class="flex flex-col items-center justify-center p-3 bg-rose-50 text-rose-700 border border-rose-200 rounded-lg hover:bg-rose-100 transition-colors">
                        <span class="text-sm font-bold uppercase tracking-wide">Absent</span>
                    </button>
                    <button onclick="submitAttendance('Tardiness')" class="flex flex-col items-center justify-center p-3 bg-amber-50 text-amber-700 border border-amber-200 rounded-lg hover:bg-amber-100 transition-colors">
                        <span class="text-sm font-bold uppercase tracking-wide">Tardy</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Records List -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                <h2 class="font-bold text-slate-800">Recent Records</h2>
                <span id="recordCount" class="text-xs font-medium bg-slate-100 text-slate-600 px-2.5 py-0.5 rounded-full">0 entries</span>
            </div>
            <ul id="attendanceList" class="divide-y divide-slate-100 max-h-[500px] overflow-y-auto">
                <!-- Records will be injected here -->
                <li class="p-8 text-center text-slate-400 italic">No records found. Start by marking attendance!</li>
            </ul>
        </div>
    </div>

    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- REPLACE THIS WITH YOUR FIREBASE CONFIG ---
        const firebaseConfig = {
             apiKey: "AIzaSyAc4Aja5MJlFKIIq_xXYCvq0Lejt3iu37M",
  authDomain: "attendence-check-6464a.firebaseapp.com",
  projectId: "attendence-check-6464a",
  storageBucket: "attendence-check-6464a.firebasestorage.app",
  messagingSenderId: "548348350698",
  appId: "1:548348350698:web:6c5448af97e33095f30793",
  measurementId: "G-LCYTB2WRQG"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const attendanceRef = collection(db, "attendance");

        // Submit Data
        window.submitAttendance = async (status) => {
            const nameInput = document.getElementById('studentName');
            const name = nameInput.value.trim();

            if (!name) {
                alert("Please enter a student name.");
                return;
            }

            try {
                await addDoc(attendanceRef, {
                    studentName: name,
                    status: status,
                    timestamp: serverTimestamp()
                });
                nameInput.value = ""; // Clear input
            } catch (e) {
                console.error("Error adding document: ", e);
                alert("Error saving data. Check console or Firebase configuration.");
            }
        };

        // Real-time Listener
        const q = query(attendanceRef, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const listElement = document.getElementById('attendanceList');
            const countElement = document.getElementById('recordCount');
            
            if (snapshot.empty) {
                listElement.innerHTML = `<li class="p-8 text-center text-slate-400 italic">No records found.</li>`;
                countElement.innerText = "0 entries";
                return;
            }

            countElement.innerText = `${snapshot.size} entries`;
            listElement.innerHTML = "";

            snapshot.forEach((doc) => {
                const data = doc.data();
                const date = data.timestamp ? data.timestamp.toDate().toLocaleString() : "Processing...";
                
                // Status color logic
                let statusBadge = "";
                if (data.status === 'Attendance') {
                    statusBadge = '<span class="px-2 py-1 text-xs font-semibold rounded-full bg-emerald-100 text-emerald-700">Present</span>';
                } else if (data.status === 'Absence') {
                    statusBadge = '<span class="px-2 py-1 text-xs font-semibold rounded-full bg-rose-100 text-rose-700">Absent</span>';
                } else {
                    statusBadge = '<span class="px-2 py-1 text-xs font-semibold rounded-full bg-amber-100 text-amber-700">Tardy</span>';
                }

                const li = document.createElement('li');
                li.className = "px-6 py-4 flex items-center justify-between hover:bg-slate-50 transition-colors";
                li.innerHTML = `
                    <div class="flex flex-col">
                        <span class="font-semibold text-slate-800">${data.studentName}</span>
                        <span class="text-xs text-slate-400">${date}</span>
                    </div>
                    <div>${statusBadge}</div>
                `;
                listElement.appendChild(li);
            });
        });
    </script>
</body>
</html>
